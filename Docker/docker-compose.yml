services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hotel_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: khoa
    volumes:
      - hotel_data:/var/lib/postgresql/data
      - ../sql/02_hotel_booking_schema.sql:/docker-entrypoint-initdb.d/02_schema.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotel_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      HOTEL_DB_HOST: database
      HOTEL_DB_PORT: 5432
      HOTEL_DB_NAME: hotel_booking
      HOTEL_DB_USER: postgres
      HOTEL_DB_PASSWORD: khoa
      HOTEL_HOST: 0.0.0.0
      HOTEL_PORT: 4180
    ports:
      - "4180:4180"
    depends_on:
      database:
        condition: service_healthy

volumes:
  hotel_data:
